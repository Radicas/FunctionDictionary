<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Preview</title>
    <link rel="stylesheet" href="qrc:/markdown/resources/css/github-markdown.css">
    <link rel="stylesheet" href="qrc:/markdown/resources/css/highlight.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #24292f;
            --code-bg: #f6f8fa;
            --border-color: #d0d7de;
            --link-color: #0969da;
            --blockquote-color: #57606a;
            --table-hover: #f6f8fa;
        }
        
        [data-theme="dark"] {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --code-bg: #161b22;
            --border-color: #30363d;
            --link-color: #58a6ff;
            --blockquote-color: #8b949e;
            --table-hover: #161b22;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
        }
        
        #container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 16px 24px;
        }
        
        .markdown-body {
            max-width: 980px;
            margin: 0 auto;
        }
        
        .markdown-body h1, .markdown-body h2, .markdown-body h3,
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        
        .markdown-body h1 {
            font-size: 2em;
            padding-bottom: .3em;
            border-bottom: 1px solid var(--border-color);
        }
        
        .markdown-body h2 {
            font-size: 1.5em;
            padding-bottom: .3em;
            border-bottom: 1px solid var(--border-color);
        }
        
        .markdown-body h3 { font-size: 1.25em; }
        .markdown-body h4 { font-size: 1em; }
        .markdown-body h5 { font-size: .875em; }
        .markdown-body h6 { font-size: .85em; color: var(--blockquote-color); }
        
        .markdown-body p {
            margin-bottom: 16px;
        }
        
        .markdown-body a {
            color: var(--link-color);
            text-decoration: none;
        }
        
        .markdown-body a:hover {
            text-decoration: underline;
        }
        
        .markdown-body code {
            padding: .2em .4em;
            margin: 0;
            font-size: 85%;
            background-color: var(--code-bg);
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }
        
        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: var(--code-bg);
            border-radius: 6px;
            margin-bottom: 16px;
        }
        
        .markdown-body pre code {
            padding: 0;
            background-color: transparent;
            font-size: 100%;
        }
        
        .markdown-body blockquote {
            padding: 0 1em;
            color: var(--blockquote-color);
            border-left: .25em solid var(--border-color);
            margin-bottom: 16px;
        }
        
        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
            margin-bottom: 16px;
        }
        
        .markdown-body li {
            margin-top: .25em;
        }
        
        .markdown-body li + li {
            margin-top: .25em;
        }
        
        .markdown-body table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-bottom: 16px;
            width: 100%;
            display: block;
            overflow-x: auto;
        }
        
        .markdown-body table th,
        .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid var(--border-color);
        }
        
        .markdown-body table th {
            font-weight: 600;
            background-color: var(--code-bg);
        }
        
        .markdown-body table tr {
            background-color: var(--bg-color);
        }
        
        .markdown-body table tr:nth-child(2n) {
            background-color: var(--code-bg);
        }
        
        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }
        
        .markdown-body hr {
            height: .25em;
            padding: 0;
            margin: 24px 0;
            background-color: var(--border-color);
            border: 0;
        }
        
        .markdown-body .task-list-item {
            list-style-type: none;
        }
        
        .markdown-body .task-list-item-checkbox {
            margin: 0 .5em .25em -1.6em;
            vertical-align: middle;
        }
        
        .mermaid {
            text-align: center;
            margin: 16px 0;
            background-color: var(--bg-color);
        }
        
        .mermaid svg {
            max-width: 100%;
        }
        
        .hljs {
            background: var(--code-bg) !important;
        }
        
        code.hljs {
            padding: 0;
        }
        
        pre code.hljs {
            display: block;
            overflow-x: auto;
            padding: 1em;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--blockquote-color);
            font-size: 14px;
            padding: 40px 20px;
        }
        
        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="markdown-body" id="content">
            <div class="empty-state">
                <div class="empty-state-icon">📄</div>
                <div>选择一个函数查看详情</div>
            </div>
        </div>
    </div>
    
    <script src="qrc:/markdown/resources/js/marked.min.js"></script>
    <script src="qrc:/markdown/resources/js/highlight.min.js"></script>
    <script src="qrc:/markdown/resources/js/mermaid.min.js"></script>
    
    <script>
        (function() {
            'use strict';
            
            var currentTheme = 'light';
            var mermaidInitialized = false;
            
            function initMermaid() {
                if (typeof mermaid !== 'undefined' && !mermaidInitialized) {
                    mermaid.initialize({
                        startOnLoad: false,
                        theme: currentTheme === 'dark' ? 'dark' : 'default',
                        securityLevel: 'loose',
                        flowchart: {
                            useMaxWidth: true,
                            htmlLabels: true
                        },
                        sequence: {
                            useMaxWidth: true
                        },
                        gantt: {
                            useMaxWidth: true
                        }
                    });
                    mermaidInitialized = true;
                }
            }
            
            function initHighlight() {
                if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
                    marked.setOptions({
                        highlight: function(code, lang) {
                            if (lang && hljs.getLanguage(lang)) {
                                try {
                                    return hljs.highlight(code, { language: lang }).value;
                                } catch (e) {
                                    console.error('Highlight error:', e);
                                }
                            }
                            return hljs.highlightAuto(code).value;
                        },
                        breaks: true,
                        gfm: true
                    });
                }
            }
            
            function escapeHtml(text) {
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }
            
            function processMermaidBlocks(html) {
                var tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                
                var codeBlocks = tempDiv.querySelectorAll('pre code.language-mermaid');
                codeBlocks.forEach(function(block, index) {
                    var mermaidCode = block.textContent;
                    var mermaidDiv = document.createElement('div');
                    mermaidDiv.className = 'mermaid';
                    mermaidDiv.setAttribute('data-mermaid', mermaidCode);
                    mermaidDiv.textContent = mermaidCode;
                    block.parentElement.replaceWith(mermaidDiv);
                });
                
                return tempDiv.innerHTML;
            }
            
            function renderMermaid() {
                if (typeof mermaid !== 'undefined') {
                    var mermaidDivs = document.querySelectorAll('.mermaid');
                    mermaidDivs.forEach(function(div) {
                        var code = div.getAttribute('data-mermaid') || div.textContent;
                        try {
                            mermaid.render('mermaid-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9), code, function(svg) {
                                div.innerHTML = svg;
                            });
                        } catch (e) {
                            console.error('Mermaid render error:', e);
                            div.innerHTML = '<pre style="color: red;">Mermaid 图表渲染错误: ' + escapeHtml(e.message || e) + '</pre>';
                        }
                    });
                }
            }
            
            window.renderMarkdown = function(content) {
                var contentDiv = document.getElementById('content');
                
                if (!content || content.trim() === '') {
                    contentDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📄</div><div>选择一个函数查看详情</div></div>';
                    return;
                }
                
                try {
                    initHighlight();
                    
                    var html;
                    if (typeof marked !== 'undefined') {
                        html = marked.parse(content);
                    } else {
                        html = '<pre>' + escapeHtml(content) + '</pre>';
                    }
                    
                    html = processMermaidBlocks(html);
                    contentDiv.innerHTML = html;
                    
                    setTimeout(function() {
                        initMermaid();
                        renderMermaid();
                    }, 50);
                    
                } catch (e) {
                    console.error('Render error:', e);
                    contentDiv.innerHTML = '<pre style="color: red;">渲染错误: ' + escapeHtml(e.message || e) + '</pre>';
                }
            };
            
            window.setTheme = function(theme) {
                currentTheme = theme;
                document.documentElement.setAttribute('data-theme', theme);
                
                if (typeof mermaid !== 'undefined') {
                    mermaidInitialized = false;
                    mermaid.initialize({
                        startOnLoad: false,
                        theme: theme === 'dark' ? 'dark' : 'default'
                    });
                    mermaidInitialized = true;
                    renderMermaid();
                }
            };
            
            window.getTheme = function() {
                return currentTheme;
            };
            
            window.scrollToAnchor = function(anchor) {
                var element = document.getElementById(anchor);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };
            
            window.getContent = function() {
                return document.getElementById('content').innerHTML;
            };
            
            document.addEventListener('click', function(e) {
                if (e.target.tagName === 'A') {
                    var href = e.target.getAttribute('href');
                    if (href && !href.startsWith('#') && !href.startsWith('javascript:')) {
                        e.preventDefault();
                        if (window.qt && window.qt.webChannelTransport) {
                            console.log('Link clicked:', href);
                        } else {
                            window.open(href, '_blank');
                        }
                    }
                }
            });
            
            initHighlight();
            initMermaid();
            
        })();
    </script>
</body>
</html>
